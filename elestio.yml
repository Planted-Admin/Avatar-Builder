# Elestio deployment config - place at the ROOT of your Git repository.
# runTime "docker" = use our Dockerfile (Node 22). Do not use "NodeJs" or Elestio will generate Node 20.
config:
  runTime: "docker"
  version: ""
  framework: ""
  installCommand: ""
  buildCommand: ""
  buildDir: ""
  runCommand: ""

ports:
  - protocol: "HTTPS"
    targetProtocol: "HTTP"
    listeningPort: "443"
    targetPort: "3000"
    targetIP: "172.17.0.1"
    public: true
    path: "/"
